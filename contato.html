<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <main class="container-main">

        <div class="container-titulo">

            <p class="texto-destaque">Ficou alguma dúvida?</p>
            <p>Caso ainda não tenha cadastro, clique para criar a sua conta.</p>

        </div>

        <div class="container-form">

            <p class="texto-destaque-form">Entre em contato</p>

            <p class="texto-comum">Nome:</p> 
            <input id="ipt_cont_nome">
            <p class="texto-comum">Email:</p> 
            <input id="ipt_cont_email">
            <p class="texto-comum">Mensagem: </p>
            <textarea id="ipt_cont_msg"></textarea> <!--Mesma coisa que input só para quando tem mais linhas-->

            <button class="btn-contato" onclick="alert('Mensagem enviada!')">ENVIAR</button>
        </div>

    </main>

</body>

</html>
