<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="simulador.css">
    <script src="../JS/simulador.js"></script>
    <title>Simulador Wine View</title>
</head>
<body>
    <header class="main-cabecalho">
        <div class="content">
            <div class="container-logo">
                <img src="../img/logo_transparente.png" alt="Logo">
            </div>
            <div class="container-nav">
                <nav>
                    <ul>
                        <li><a href="../home/home.html">Home</a></li>
                        <li><a href="../sobre/sobre.html">Sobre</a></li>
                        <li><a href="../simulador/simulador.html">Simulador</a></li>
                        <li>
                            <a href="../login/login.html">
                                <button class="btn-nav-entrar">Entrar</button>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main class="container-principal">
        <div class="flex-content">
            <!-- Lado Esquerdo: Formulário -->
            <div class="conteudo">
                <div class="titulo">
                    <h1>Simulador Wine View</h1>
                </div>
                <p>Quantos litros de vinho você produz por mês?</p>
                <input type="number" id="input_producao_mensal" placeholder="Ex: 1000">
                <p>Qual o custo de produção de 1 litro de vinho?</p>
                <input type="number" id="input_custo_litro" placeholder="Ex: 15.00">
                <p>Qual o valor médio de venda de uma garrafa (750ml)?</p>
                <input type="number" id="input_valor_garrafa" placeholder="Ex: 30.00">
                <button class="btn-simulacao" onclick="simular_vinho()">Simular</button>
            </div>

            <div id="div_mensagem"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-logo">
            <img src="../img/logo_transparente.png" alt="Logo Wine View">
        </div>
        <nav class="footer-nav">
            <a href="../home/home.html">PÁGINA INICIAL</a>
            <a href="#id_contato">CONTATO</a>
            <a href="../sobre/sobre.html">SOBRE</a>
            <a href="../login/login.html">CADASTRE-SE / ENTRE</a>
        </nav>
        <div class="footer-email">
            <span>✉</span>
            <p>contato@wine.view.com</p>
        </div>
    </footer>

</body>
</html>
