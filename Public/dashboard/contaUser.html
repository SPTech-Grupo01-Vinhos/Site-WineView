<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styleGlobal.css">
    <link rel="stylesheet" href="contaUser.css">
    <script src="../JS/contaUser.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Josefin+Sans:wght@300;400;600&display=swap"
        rel="stylesheet">
    <title>Dashboard</title>
</head>

<body onload="buscarDadosUsuario()">

    <div class="container-principal">
        <div class="menu">
            <img src="../img/dash/logoBranca.png" alt="logo" class="logo">

            <div class="itens">
                <div class="item">
                    <img src="../img/dash/iconeGrafico.png" alt="" class="imgItens">
                    <a href="painelGeral.html">Painel Geral</a>
                </div>

                <div class="item">
                    <img src="../img/dash/iconeSininho.png" alt="" class="imgItens">
                    <a href="alerta.html">Alertas</a>
                </div>

                <div class="item">
                    <img src="../img/dash/iconeVinicola.png" alt="" class="imgItens">
                    <a href="vinicola.html">Vinícola</a>
                </div>

                <div class="item">
                    <img src="../img/dash/iconeConta.png" alt="" class="imgItens">
                    <a href="contaUser.html">Conta</a>
                </div>
                <div class="item" id="p5">
                    <img src="../img/dash/icon-manual-menu.png" alt="" class="imgItens">
                    <a href="./manual.html">Manual</a>
                </div>
                <div class="item" id="p5">
                    <img src="../img/dash/icon-suporte-2.png" alt="" class="imgItens">
                    <a href="./suporte.html">Suporte</a>
                </div>
            </div>

            <div class="voltar">

                <img src="../img/dash/iconePorta.png" alt="" class="imgItens">
                <a href="../home/home.html">Voltar ao Site</a>
            </div>
        </div>

        <div class="conta" id="idConta">
            <div class="container-conta">

                <div class="titulo">
                    <h2>Conta</h2>
                    <p>Aqui você pode visualizar as informações da sua conta.</p>
                </div>

                <div class="caixa-conta">

                    <div class="titulo-conta">
                        <h2>Informações do Usuário</h2>
                    </div>

                    <div class="container-info-conta">
                        <div class="bolinha-info">
                            <img src="../img/dash/icon-pessoa.png" alt="">
                        </div>
                        <div class="infos-conta">
                            <p class="subtitulo">Nome Completo</p>
                            <p id="nome-user">João da Silva</p>
                            <input type="text" id="ipt_nome" style="display: none;" class="ipt-edicao">
                        </div>
                    </div>

                    <div class="container-info-conta">
                        <div class="bolinha-info">
                            <img src="../img/dash/icon-carta.png" alt="">
                        </div>
                        <div class="infos-conta">
                            <p class="subtitulo">Email</p>
                            <p id="email-user">joao.silva@email.com</p>
                            <input type="text" id="ipt_email" style="display: none;" class="ipt-edicao">
                        </div>
                    </div>

                    <div class="container-info-conta">
                        <div class="bolinha-info">
                            <img src="../img/dash/icon-cadeado.png" alt="">
                        </div>
                        <div class="infos-conta">
                            <p class="subtitulo">Senha</p>
                            <p id="senha-user">**********</p>
                            <input type="password" id="ipt_senha" style="display: none;" class="ipt-edicao">
                        </div>
                    </div>

                    <div class="btn-editar-salvar">
                        <button onclick="liberarEdicao()" id="btn-editarPerfil">Editar Perfil</button>
                        <button onclick="salvarEdicao()" id="btn-salvarEdicao" style="display: none;">Salvar</button>
                    </div>

                </div>

            </div>
        </div>
    </div>
</body>

</html>
