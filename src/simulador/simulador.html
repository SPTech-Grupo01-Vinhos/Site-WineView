<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador</title>
    <link rel="stylesheet" href="simulador.css">
</head>

<body>
    <header class="main-cabecalho"> <!-- Cabeçalho com logo e navegação -->

        <div class="content">

            <div class="container-logo">
                <img src="../img/logo_transparente.png" alt="Logo">
            </div>

            <div class="container-nav">

                <nav> <!-- Navegação principal do site -->
                    <ul>
                        <li><a href="../home/home.html">Home</a></li> <!-- Link para a página Home -->
                        <li><a href="../sobre/sobre.html">Sobre</a></li> <!-- Link para a página Sobre -->
                        <li><a href="../simulador/simulador.html">Simulador</a></li>
                        <!-- Link para a página Simulador -->
                        <a href="../login/login.html">
                            <button class="btn-nav-entrar">Entrar</button>
                        </a>
                        <!-- Link para a página de Login -->
                    </ul>
                </nav>

            </div>

        </div>
    </header>

    <div class="container-principal">

        <div class="conteudo">

            <div class="titulo">
                <h1>Simulador Wine View</h1>
            </div>

            <p>Quantos litros de vinho você produz por mês?</p>
            <input type="text" id="input_producao_mensal" placeholder="Digite aqui...">
            <p>Qual o custo de produção de 1 litro de vinho?</p>
            <input type="text" id="input_custo_litro" placeholder="Digite aqui...">
            <p>Qual o valor médio de venda de uma garrafa (750ml)?</p>
            <input type="text" id="input_valor_garrafa" placeholder="Digite aqui...">
            <button class="btn-simulacao" onclick="simular_vinho()">Simular</button>
        </div>

        <span id="div_mensagem">
    </div>
    </div>

</body>

</html>

<script>
    function simular_vinho() {
        let litros_mes = Number(input_producao_mensal.value)
        let custo_litro = Number(input_custo_litro.value)
        let valor_garrafa = Number(input_valor_garrafa.value)

        let total_garrafas_mes = litros_mes / 0.75
        let custo_total_mes = litros_mes * custo_litro
        let receita_total_mes = total_garrafas_mes * valor_garrafa
        let lucro_estimado_mes = receita_total_mes - custo_total_mes

        // novo cálculo: custo por garrafa
        let custo_por_garrafa = custo_litro * 0.75

        let perda_10_porcento = receita_total_mes * 0.10
        let perda_2_porcento = receita_total_mes * 0.02

        let economia_mensal = perda_10_porcento - perda_2_porcento
        let economia_anual = economia_mensal * 12

        div_mensagem.innerHTML = `
        <div class="card-resultado">
        <h3>Análise de Produção</h3>
        <p>Você produz <span class="destaque">${litros_mes}</span> litros por mês.</p>
        <p>Equivale a aprox. <span class="destaque">${total_garrafas_mes.toFixed(0)}</span> garrafas/mês.</p>
        
        <hr>

        <div class="financeiro">
            <p>Custo por litro: <b>R$ ${custo_litro.toFixed(2)}</b></p>
            <p>Custo por garrafa: <b>R$ ${custo_por_garrafa.toFixed(2)}</b></p>
            <p class="custo-total">Custo total mensal: <span>R$ ${custo_total_mes.toFixed(2)}</span></p>
        </div>

        <div class="lucro-box">
            Lucro bruto estimado: <b>R$ ${lucro_estimado_mes.toFixed(2)}</b>
        </div>

        <h3>Solução Wine View</h3>
        <p class="economia">Economia Mensal: <span>R$ ${economia_mensal.toFixed(2)}</span></p>
        <p class="economia">Economia Anual: <span>R$ ${economia_anual.toFixed(2)}</span></p>
         </div>
`;
    }
</script>
