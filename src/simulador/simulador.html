<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Wine View</title>
    <link rel="stylesheet" href="simulador.css">
</head>
<body>
    <header class="main-cabecalho">
        <div class="content">
            <div class="container-logo">
                <img src="../img/logo_transparente.png" alt="Logo">
            </div>
            <div class="container-nav">
                <nav>
                    <ul>
                        <li><a href="../home/home.html">Home</a></li>
                        <li><a href="../sobre/sobre.html">Sobre</a></li>
                        <li><a href="../simulador/simulador.html">Simulador</a></li>
                        <li>
                            <a href="../login/login.html">
                                <button class="btn-nav-entrar">Entrar</button>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main class="container-principal">
        <div class="flex-content">
            <!-- Lado Esquerdo: Formulário -->
            <div class="conteudo">
                <div class="titulo">
                    <h1>Simulador Wine View</h1>
                </div>
                <p>Quantos litros de vinho você produz por mês?</p>
                <input type="number" id="input_producao_mensal" placeholder="Ex: 1000">
                <p>Qual o custo de produção de 1 litro de vinho?</p>
                <input type="number" id="input_custo_litro" placeholder="Ex: 15.00">
                <p>Qual o valor médio de venda de uma garrafa (750ml)?</p>
                <input type="number" id="input_valor_garrafa" placeholder="Ex: 50.00">
                <button class="btn-simulacao" onclick="simular_vinho()">Simular</button>
            </div>

            <!-- Lado Direito: Resultado -->
            <div id="div_mensagem"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-logo">
            <img src="../img/logo_transparente.png" alt="Logo Wine View">
        </div>
        <nav class="footer-nav">
            <a href="../home/home.html">PÁGINA INICIAL</a>
            <a href="#id_contato">CONTATO</a>
            <a href="../sobre/sobre.html">SOBRE</a>
            <a href="../login/login.html">CADASTRE-SE / ENTRE</a>
        </nav>
        <div class="footer-email">
            <span>✉</span>
            <p>contato@wine.view.com</p>
        </div>
    </footer>

</body>
</html>

 <script>
        function simular_vinho() {
            let litros_mes = Number(input_producao_mensal.value);
            let custo_litro = Number(input_custo_litro.value);
            let valor_garrafa = Number(input_valor_garrafa.value);

            let total_garrafas_mes = litros_mes / 0.75;
            let custo_total_mes = litros_mes * custo_litro;
            let receita_total_mes = total_garrafas_mes * valor_garrafa;
            let lucro_estimado_mes = receita_total_mes - custo_total_mes;

            let custo_por_garrafa = custo_litro * 0.75;
            let perda_10_porcento = receita_total_mes * 0.10;
            let perda_2_porcento = receita_total_mes * 0.02;

            let economia_mensal = perda_10_porcento - perda_2_porcento;
            let economia_anual = economia_mensal * 12;

            div_mensagem.innerHTML = `
                <div class="card-resultado">
                    <h3>Análise de Produção</h3>
                    <p>Produção mensal: <span class="destaque">${litros_mes}L</span></p>
                    <p>Total de garrafas: <span class="destaque">${total_garrafas_mes.toFixed(0)}</span></p>
                    <hr>
                    <div class="financeiro">
                        <p>Custo por garrafa: <b>R$ ${custo_por_garrafa.toFixed(2)}</b></p>
                        <p class="custo-total">Custo total mensal: <b>R$ ${custo_total_mes.toFixed(2)}</b></p>
                    </div>
                    <div class="lucro-box">
                        Lucro bruto estimado: <b>R$ ${lucro_estimado_mes.toFixed(2)}</b>
                    </div>
                    <h3>Solução Wine View</h3>
                    <p class="economia">Economia Mensal: <span class="destaque">R$ ${economia_mensal.toFixed(2)}</span></p>
                    <p class="economia">Economia Anual: <span class="destaque">R$ ${economia_anual.toFixed(2)}</span></p>
                </div>
            `;
        }
    </script>
