<script>
    // dash tanque 1
const ctx1 = document.getElementById('linhaTanque1').getContext('2d');
const linhaTanque1 = new Chart(ctx1, {
      type: 'line',
      data: {
        labels: ['a', 'b', 'c'],
        datasets: [{
          label: 'Temperatura',
          data: [20, 25, 28, 30],
          borderColor: 'rgba(75, 192, 192, 1)',
          backgroundColor: 'rgba(75, 192, 192, 0.2)',
          fill: false,
          tension: 0.0
        }]
      },
      options: {
       responsive: true,
       maintainAspectRatio: false,
        plugins: {
          title: {
            display: true,
            text: 'Temperatura'
          },
          legend: {
            position: 'bottom'
          }
        },
        scales: {
          y: {
            beginAtZero: true
          }
        }
      }
    });
