<!DOCTYPE html>

    <link rel="stylesheet" href="DashboardSecundaria.css">

<body>


    <h1 class="titulo" style="text-align: center;">
        Oscilação de temperatura por hora
    </h1>
<div class="menu">

    <img src="../../img/dash/logoBranca.png" alt="logo" class="logo">

    <div class="itens">

        <div class="item">
            <img src="../../img/dash/iconeGrafico.png" alt="" class="imgItens">
            <a href="#linhaTanque1">Tanque 1</a>
        </div>

        <div class="item">

    </div>

    </div>

    

</div>

    <div class="dashboards">

        <h4 style="margin-top: 40px;">Tanque 1</h4>
        <div class="card1">
            <canvas id="linhaTanque1"></canvas>
        </div>

        <hr>

        <h4 style="margin-top: 40px;">Tanque 2</h4>
        <div class="card2">
            <canvas id="linhaTanque2"></canvas>
        </div>

        <hr>

        <h4 style="margin-top: 40px;">Tanque 3</h4>
        <div class="card3">
            <canvas id="linhaTanque3"></canvas>
        </div>

        <hr>

        <h4 style="margin-top: 40px;">Tanque 4</h4>
        <div class="card4">
            <canvas id="linhaTanque4"></canvas>
        </div>
    <hr>
    </div>

</body>
</html>
<script>
    
    // dash tanque 1
const ctx1 = document.getElementById('linhaTanque1').getContext('2d');
const linhaTanque1 = new Chart(ctx1, {
      type: 'line',
      data: {
        labels: ['a', 'b', 'c'],
        datasets: [{
          label: 'Temperatura',
          data: [20, 25, 28, 30],
          borderColor: 'rgba(75, 192, 192, 1)',
          backgroundColor: 'rgba(75, 192, 192, 0.2)',
          fill: false,
          tension: 0.0
        }]
      },
      options: {
       responsive: true,
       maintainAspectRatio: false,
        plugins: {
          title: {
            display: true,
            text: 'Temperatura'
          },
          legend: {
            position: 'bottom'
          }
        },
        scales: {
          y: {
            beginAtZero: true
          }
        }
      }
    });

    // dash tanque 2

})
