<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css"> <!--link do css-->
    <title>Login</title>
</head>

<body>
    <div class="container-main"> <!--conteúdo principal da página-->

        <div class="container-esquerda"> <!--título e introdução da página-->

            <div class="content">
                <h1>Seja bem-vindo!</h1>
                <p>Caso ainda não tenha cadastro, <br> clique para criar sua conta.</p>
    
                <a href="../cadastro/cadastro.html"> <!--link para a página de cadastro-->
                    <button class="btn-pagina-cadastro" type="button">Cadastrar-se</button>
                </a>
            </div>

        </div>


        <div class="container-direita">

            <div class="content">
                <h2>Login</h2> <!--título do formulário de login-->
                <p>Email:</p>
                <input id="ipt_login_email" placeholder="Digite o email...">
                <p>Senha:</p>
                <input type="password" id="ipt_login_senha" placeholder="Digite sua senha...">
    
                    <!--link para a página do dashboard, que é a página principal do usuário após o login-->
                    <button class="btn-pagina-dash" type="button" onclick="logar()">Entrar</button>

    
    
                <!-- <label class="check-login"> 
                    <input type="checkbox">
                    Permanecer conectado?
                </label> -->
            </div>

        </div>

    </div>

</body>

</html>

<script>

    let tentativas = 3;

    function logar() {

        let email_digitado = ipt_login_email.value
        let senha_digitada = ipt_login_senha.value
        let email = 'Vinho123@gmail.com'
        let senha = '@Vinho123'



        if (email_digitado != email || senha_digitada != senha) {
            alert('Senha e/ou E-mail errado!')
            tentativas--;
            div_mensagem.innerHTML = `Você tem mais ${tentativas}`

            if (tentativas == 1) {
                alert('Essa é última tentativa')
            }

            else if (tentativas == 0) {
                alert('Acesso negado!')
                div_mensagem.innerHTML = `<span style="color: red">Você estourou seu limite de tentativas! tente mais tarde.</span>`
                tentativas = 3
            }

        } else { 
            window.location.href = "../dashboard/dashboard.html"
            alert('Seja bem-vindo(a) Nome do Cliente') 
        }

    }

</script>
