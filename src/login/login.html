<!DOCTYPE html>
<html lang="en">

<head>

</head>

<body>
    <header class="main-cabecalho"> <!--cabeçalho da página-->

        <div class="logo-e-titulo"> <!--logo e título do site-->

            <div class="logo-icon">
                <img src="" alt="Logo">
            </div>

        </div>

        <nav class="container-nav"> <!--barra de navegação-->
            <ul>
                <li><a href="../home/home.html">Home</a></li> <!--links para as outras páginas-->

        </div>

</body>

<script>

    let tentativas = 3;

    function logar() {

        let email_digitado = ipt_login_email.value

        let senha_digitada = ipt_login_senha.value

        let email = 'Vinho123@gmail.com'

        let senha = '@Vinho123'



        if (email_digitado != email || senha_digitada != senha) {

            alert('Senha e/ou E-mail errado!')

            tentativas--;

            div_mensagem.innerHTML = `Você tem mais ${tentativas}`

            if (tentativas == 1) {

                alert('Essa é última tentativa')

            }

            else if (tentativas == 0) {
                alert('Acesso negado!')

                div_mensagem.innerHTML = `<span style="color: red">Você estourou seu limite de tentativas! tente mais tarde.</span>`

                tentativas = 3

            }

        }

        else { alert('Seja bem-vindo(a) Nome do Cliente') }

    }

</script>
