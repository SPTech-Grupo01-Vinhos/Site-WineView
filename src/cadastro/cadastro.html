<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastro.css">
    <title>Cadastro</title>
</head>

<body>

    <header class="main-cabecalho">

        <div class="logo-e-titulo">

            <div class="logo-icon">
                <img src="" alt="Logo">
            </div>

        </div>

        <nav class="container-nav">
            <ul>
                <li><a href="../home/home.html">Home</a></li>
                <li><a href="../sobre/sobre.html">Sobre</a></li>
                <li><a href="../simulador/simulador.html">Simulador</a></li>
                <li class="btn-nav-entrar"><a href="../login/login.html">Entrar</a></li>
            </ul>
        </nav>
    </header>

    <main class="container-main">
        <div>
            <p>Seja bem-vindo!</p>
            <p>Caso já tenha cadastro, clique para logar em sua conta.</p>

            <a href="../login/login.html">
                <button class="btn-pagina-login" type="button">Login</button>
            </a>

        </div>


        <div class="container-cadastro">
            <p class="container-titulo">Cadastro</p>

            <div class="container-user">
                <p>Nome Completo:</p>
                <input id="ipt_nome">
                <p>E-mail Corporativo:</p>
                <input id="ipt_email">
                <p>Cargo:</p>
                <input id="ipt_cargo">
                <p>Celular:</p>
                <input id="ipt_celular">
                <p>Senha:</p>
                <input type="password" id="ipt_senha">
                <p>Confirme a senha:</p>
                <input type="password" id="ipt_senha_confirmacao">
            </div>

            <div class="container-endereco">
                <p>Endereço Comercial</p>
                <p>Logradouro:</p>
                <input id="ipt_rua">
                <p>Número:</p>
                <input id="ipt_num">
                <p>Cidade:</p>
                <input id="ipt_cidade">
                <p>Estado:</p>
                <input id="ipt_uf">
                <p>Complemento:</p>
                <input id="ipt_comp">
                <p>CEP:</p>
                <input id="ipt_cep">
            </div>

            <a href="../dashboard/dashboard.html">
                <button class="btn-pagina-dash" type="button" >Cadastrar</button>
            </a>

            <label class="check-login">
                <input type="checkbox">
                Permanecer conectado?
            </label>

        </div>

    </main>

</body>

</html>
