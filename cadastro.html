<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h2>Seja bem-vindo!</h2>
    <p>Caso já tenha cadastro, clique para logar em sua conta.</p>
    <button onclick="telaLogin()">LOGIN</button>

    <hr>

    <h3>Cadastrar</h3>
    Nome Completo: <input id="ipt_nome">
    Razão Social: <input id="ipt_razao"><br>
    E-mail Corporativo: <input id="ipt_email">
    Nome Fantasia: <input type="text" id="ipt_nomefantasia"><br>
    Cargo: <input id="ipt_cargo">
    Quantidade de tanques de vinho: <input type="number" id="ipt_tanques"><br>
    Celular: <input id="ipt_celular">
    Senha: <input type="password" id="ipt_senha"><br>

    <h4>Endereço Comercial</h4>
    Logradouro: <input id="ipt_rua">
    Número: <input id="ipt_num">
    Cidade: <input id="ipt_cidade">
    Estado: <input id="ipt_uf"><br>
    Complemento: <input id="ipt_comp">
    CEP: <input id="ipt_cep"><br><br>
    <button onclick="alert('Cadastro realizado!')">CADASTRAR</button>
</body>

</html>
